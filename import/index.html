<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepMate – Rezept importieren</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        .store-btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #000; color: #fff; text-decoration: none; border-radius: 5px; }
    </style>
    <script>
        window.onload = function() {
            const fragment = window.location.hash.slice(1);
            if (fragment) {
                // Fallback für Nutzer ohne installierte App
                window.location.replace('prepmate://import#' + fragment);
            }
        };
    </script>
</head>
<body>
    <h2>Rezept wird geöffnet...</h2>
    <p>Falls sich die PrepMate App nicht automatisch öffnet, hast du sie eventuell noch nicht installiert.</p>
    <a href="https://play.google.com/store/apps/details?id=de.prepmate.app" class="store-btn">PrepMate im Play Store laden</a>
</body>
</html>
