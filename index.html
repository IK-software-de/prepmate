<!DOCTYPE html>
<html lang="de">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/prepmate/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2A9D8F">
  <meta name="description" content="PrepMate – Rezepte, Einkaufsliste und Körper-Tracking für die intelligente Ernährungsplanung.">

  <!-- iOS/PWA meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="PrepMate">
  <link rel="apple-touch-icon" href="icons/Icon-apple-touch-180.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>PrepMate</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html,
    body,
    flutter-view,
    flt-glass-pane,
    #flutter_host {
      width: 100%;
      height: 100dvh;
      margin: 0;
      overscroll-behavior: none;
      touch-action: pan-x pan-y pinch-zoom;
    }

    flutter-view,
    flt-glass-pane,
    #flutter_host {
      display: block;
      overscroll-behavior-x: contain;
    }

    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #1A1A2E;
      z-index: 9999;
    }
    #splash img {
      width: 96px;
      height: 96px;
      animation: prepmate-splash-pulse 1.2s ease-in-out infinite;
    }
    @keyframes prepmate-splash-pulse {
      0%, 100% { opacity: 0.6; transform: scale(0.96); }
      50% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <script>
    // Restores a path encoded by 404.html before Flutter reads the initial URL.
    (function (location) {
      if (location.search[1] === '/') {
        var path = location.search.slice(1).split('&').map(function (part) {
          return part.replace(/~and~/g, '&');
        }).join('?');
        window.history.replaceState(null, '', location.pathname.slice(0, -1) + path + location.hash);
      }
    }(window.location));
  </script>
  <!-- Leichtgewichtiger Lade-Indikator, sichtbar ab dem ersten Frame bis die
       Flutter-Engine (inkl. WASM-Download) vollständig gebootstrapt ist. -->
  <div id="splash">
    <img src="icons/Icon-192.png" alt="PrepMate lädt …">
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('splash');
      if (splash) {
        splash.remove();
      }
    });
  </script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
