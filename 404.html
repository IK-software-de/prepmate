<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PrepMate</title>
  <script>
    // GitHub Pages serves this file for unknown paths. Keep the app path and
    // import fragment while redirecting to the Flutter entry point.
    (function (location) {
      var pathSegmentsToKeep = 1; // /prepmate/
      var base = location.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/');
      var route = location.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/');
      var query = location.search ? '&' + location.search.slice(1).replace(/&/g, '~and~') : '';
      location.replace(
        location.protocol + '//' + location.host + base + '/?/' + route + query + location.hash
      );
    }(window.location));
  </script>
</head>
<body></body>
</html>
